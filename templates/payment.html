{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Payment | HIPMS</title>

    <link rel="stylesheet" href="{% static 'css/hospital-theme.css' %}" />
    <link rel="stylesheet" href="{% static 'css/payment.css' %}" />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">Hospital Management</div>

      <ul class="nav-links">
        <li>
          <a href="{% url 'dashboard' %}"> Dashboard </a>
        </li>

        <li>
          <a href="{% url 'logout' %}"> Logout </a>
        </li>
      </ul>
    </nav>

    <div class="container">
      <div class="card">
        <h2>Appointment Payment</h2>

        <p>
          Doctor:
          <strong> {{ appointment.doctor.user.full_name }} </strong>
        </p>

        <p>
          Consultation Fee:
          <strong> ₹{{ appointment.doctor.consultation_fee }} </strong>
        </p>

        <form method="POST">
          {% csrf_token %}

          <label> Select Payment Method </label>

          <select name="method" required>
            <option value="">Choose Payment Method</option>

            <option value="UPI">UPI</option>

            <option value="Card">Debit/Credit Card</option>

            <option value="Net Banking">Net Banking</option>

            <option value="Cash">Cash</option>
          </select>

          <br /><br />

          <button type="submit" class="btn">
            Pay ₹{{ appointment.doctor.consultation_fee }}
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
