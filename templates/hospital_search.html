{% load static %}

<!doctype html>
<html>
  <head>
    <title>Hospitals</title>

    <link rel="stylesheet" href="{% static 'css/hospital_search.css' %}" />
    <link rel="stylesheet" href="{% static 'css/hospital-theme.css' %}" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">Hospital Management</div>

      <ul class="nav-links">
        <li>
          <a href="/">🏠︎</a>
        </li>
      </ul>
    </nav>

    <div class="container">
      <h1>Hospital Directory</h1>

      <input
        type="text"
        id="searchInput"
        placeholder="Search Hospital..."
        onkeyup="searchHospital()"
      />

      <div class="hospital-grid">
        {% for hospital in hospitals %}

        <div class="hospital-card">
          <h2>{{ hospital.hospital_name }}</h2>

          <p>{{ hospital.city }}</p>

          <p>{{ hospital.phone }}</p>

          <a href="{% url 'hospital_details' hospital.hospital_id %}">
            View Details
          </a>
        </div>

        {% endfor %}
      </div>
    </div>

    <script>
      function searchHospital() {
        let input = document.getElementById("searchInput").value.toLowerCase();

        let cards = document.getElementsByClassName("hospital-card");

        for (let i = 0; i < cards.length; i++) {
          let text = cards[i].innerText.toLowerCase();

          cards[i].style.display = text.includes(input) ? "block" : "none";
        }
      }
    </script>
  </body>
</html>
