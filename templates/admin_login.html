{% load static %}

<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin Login | HIPMS</title>
    <link rel="stylesheet" href="{% static 'css/hospital-theme.css' %}" />
    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">Hospital Management</div>

      <ul>
        <li>
          <a href="/">🏠︎</a>
        </li>

        <li>
          <a href="/login/">User Login</a>
        </li>
      </ul>
    </nav>

    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1>Admin Login</h1>

          <p>Access the Hospital Administration Panel</p>
        </div>

        <form method="POST">
          {% csrf_token %} {% if error %}
          <div class="error-message">{{ error }}</div>
          {% endif %}

          <div class="form-group">
            <label> Admin Username </label>

            <input
              type="text"
              name="username"
              placeholder="Enter Admin Username"
              required
            />
          </div>

          <div class="form-group">
            <label> Password </label>

            <input
              type="password"
              name="password"
              placeholder="Enter Password"
              required
            />
          </div>

          <button type="submit" class="login-btn">Login to Admin Panel</button>
        </form>
      </div>
    </div>
  </body>
</html>
