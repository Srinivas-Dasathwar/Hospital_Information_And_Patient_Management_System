{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Appointment | HIPMS</title>

    <link rel="stylesheet" href="{% static 'css/hospital-theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/book_appointment.css' %}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>


    <!-- Appointment Form -->

    <section class="appointment-section">

        <div class="appointment-card">

            <div class="heading">

                <h1>
                    Book an Appointment
                </h1>

                <p>
                    Schedule your appointment with a doctor quickly and easily.
                </p>

            </div>

            <form action="{% url 'book_appointment' %}" method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <!-- Doctor -->

                <div class="form-group">

                    <label>Select Doctor</label>

                    <select name="doctor" required>

                        <option value="">
                            Choose a Doctor
                        </option>

                        {% for d in doctors %}

                        <option value="{{ d.doctor_id }}">

                            Dr. {{ d.user.full_name }}
                            - {{ d.specialization }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Date & Time -->

                <div class="form-row">

                    <div class="form-group">

                        <label>Appointment Date</label>

                        <input type="date" id="date" name="date" required>

                    </div>

                    <div class="form-group">

                        <label>Appointment Time</label>

                        <input type="time" name="time" required>

                    </div>

                </div>

                <!-- Reason -->

                <div class="form-group">

                    <label>Reason for Visit</label>

                    <textarea name="reason" rows="5" placeholder="Describe your symptoms or reason for consultation..."
                        required></textarea>

                </div>

                <!-- Upload -->

                <div class="form-group">

                    <label>
                        Upload Previous Reports / Prescriptions
                    </label>

                    <input type="file" name="medical_file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">

                </div>

                <!-- Submit -->

                <button type="submit" class="submit-btn">

                    Book Appointment

                </button>

            </form>

        </div>

    </section>

    <script>
        let today = new Date().toISOString().split('T')[0];

        document.getElementById('date').min = today;
    </script>

        </div>
    </div>

</body>

</html>
